name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# ←←← Add these permissions
permissions:
  contents: write     # Required to create/update releases and upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release x64
        run: msbuild JourneyIntroSkip.sln /p:Configuration=Release /p:Platform=x64 /m /verbosity:minimal

      - name: Prepare Release Assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item -Path "x64\Release\dinput8.dll" -Destination "artifacts\" -Force
          Copy-Item -Path "x64\Release\JourneyIntroSkip.asi" -Destination "artifacts\" -Force
          Get-ChildItem artifacts

      - name: Upload Build Artifacts (manual download)
        uses: actions/upload-artifact@v4
        with:
          name: JourneyIntroSkip-Build
          path: artifacts/
          if-no-files-found: error

      # Automatic Release when pushing a tag (e.g. v1.0)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dinput8.dll
            artifacts/JourneyIntroSkip.asi
          draft: false
          prerelease: false
          name: Release ${{ github.ref_name }}
          body: |
            **Automatic build from GitHub Actions**

            ### Included Files
            - `dinput8.dll` — Official Ultimate ASI Loader (downloaded during pre-build)
            - `JourneyIntroSkip.asi` — Intro skip plugin built from this repository

            Built from commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}