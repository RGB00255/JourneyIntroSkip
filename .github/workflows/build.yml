name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release x64
        run: msbuild JourneyIntroSkip.sln /p:Configuration=Release /p:Platform=x64 /m /verbosity:minimal

      - name: Prepare Release Assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          
          # Copy the built files
          Copy-Item -Path "x64\Release\dinput8.dll" -Destination "artifacts\" -Force
          Copy-Item -Path "x64\Release\JourneyIntroSkip.asi" -Destination "artifacts\" -Force
          
          # Create a nice zip with version in the filename (if tag exists)
          $version = if ($env:GITHUB_REF -match 'refs/tags/v(.*)') { $matches[1] } else { 'latest' }
          $zipName = "JourneyIntroSkip-v$version.zip"
          
          Compress-Archive -Path "artifacts\dinput8.dll", "artifacts\JourneyIntroSkip.asi" `
                           -DestinationPath "artifacts\$zipName" -Force
          
          Get-ChildItem artifacts

      - name: Upload Build Artifacts (for manual download)
        uses: actions/upload-artifact@v4
        with:
          name: JourneyIntroSkip-Build
          path: artifacts/
          if-no-files-found: error

      # Automatic Release when pushing a tag
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/JourneyIntroSkip-*.zip
          draft: false
          prerelease: false
          name: Release ${{ github.ref_name }}
          body: |
            **Automatic build from GitHub Actions**

            ### Download
            `JourneyIntroSkip-${{ github.ref_name }}.zip` — contains both files

            ### Files inside the zip:
            - `dinput8.dll` — Official Ultimate ASI Loader
            - `JourneyIntroSkip.asi` — Intro skip plugin

            Built from commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}