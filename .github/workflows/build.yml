name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]                    # Triggers on tags like v1.0, v1.1.2, etc.
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:                  # Allows manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release x64
        run: msbuild JourneyIntroSkip.sln /p:Configuration=Release /p:Platform=x64 /m /verbosity:minimal

      - name: Prepare Release Assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item -Path "x64\Release\dinput8.dll" -Destination "artifacts\" -Force
          Copy-Item -Path "x64\Release\JourneyIntroSkip.asi" -Destination "artifacts\" -Force
          Get-ChildItem artifacts

      - name: Upload Build Artifacts (for manual download)
        uses: actions/upload-artifact@v4
        with:
          name: JourneyIntroSkip-Build
          path: artifacts/
          if-no-files-found: error

      # ====================== AUTOMATIC RELEASE ======================
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')   # Only runs when you push a tag
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dinput8.dll
            artifacts/JourneyIntroSkip.asi
          draft: false
          prerelease: false
          name: Release ${{ github.ref_name }}
          body: |
            **Automatic build from GitHub Actions**

            ### Files
            - `dinput8.dll` — Official Ultimate ASI Loader (downloaded during build)
            - `JourneyIntroSkip.asi` — Intro skip plugin built from this repository

            Built on: ${{ github.event.repository.updated_at }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}